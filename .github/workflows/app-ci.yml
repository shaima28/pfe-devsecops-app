name: App CI Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check app syntax
        run: node --check src/app.js

      - name: Run tests
        run: npm test

      # ✅ SONARQUBE
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ✅ TRIVY FILESYSTEM JSON
      - name: Trivy filesystem scan JSON
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-results.json
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # ✅ BUILD DOCKER IMAGE
      - name: Build Docker image
        run: docker build -t test-image:${{ github.sha }} .

      # ✅ TRIVY IMAGE JSON
      - name: Trivy Docker image scan JSON
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: test-image:${{ github.sha }}
          format: json
          output: trivy-image-results.json
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # ✅ TABLEAU PRO DANS GITHUB ACTIONS SUMMARY
      - name: Show Trivy vulnerabilities summary
        if: always()
        run: |
          echo "## 🔐 Trivy Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FS_HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-fs-results.json)
          FS_CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-fs-results.json)

          IMG_HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-image-results.json)
          IMG_CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image-results.json)

          FS_TOTAL=$((FS_HIGH + FS_CRITICAL))
          IMG_TOTAL=$((IMG_HIGH + IMG_CRITICAL))
          TOTAL_HIGH=$((FS_HIGH + IMG_HIGH))
          TOTAL_CRITICAL=$((FS_CRITICAL + IMG_CRITICAL))
          GLOBAL_TOTAL=$((FS_TOTAL + IMG_TOTAL))

          echo "| Scan Type | HIGH | CRITICAL | TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---:|---:|---:|" >> $GITHUB_STEP_SUMMARY
          echo "| Filesystem Scan | $FS_HIGH | $FS_CRITICAL | $FS_TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image Scan | $IMG_HIGH | $IMG_CRITICAL | $IMG_TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL_HIGH** | **$TOTAL_CRITICAL** | **$GLOBAL_TOTAL** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$GLOBAL_TOTAL" -eq 0 ]; then
            echo "✅ No HIGH or CRITICAL vulnerabilities detected." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ HIGH or CRITICAL vulnerabilities detected. Please review Trivy results." >> $GITHUB_STEP_SUMMARY
          fi

      # ✅ TRIVY SARIF POUR GITHUB SECURITY
      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: test-image:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif