name: App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Installation des dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Vérification syntaxique du fichier principal
      - name: Check app syntax
        run: node --check src/app.js

      # 5. Test (non bloquant)
      - name: Run tests
        run: npm test

      # 6. Vérification Docker (très important pour ton projet)
      - name: Build Docker image
        run: docker build -t test-image .